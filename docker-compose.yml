version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "80"
    environment:
      APP_BASE_PATH: "/"
      APP_DEBUG: "false"
      APP_ENCRYPTION_KEY: "clave-secreta-produccion-32bytes!"
      DB_HOST: "db"
      DB_PORT: "3306"
      DB_DATABASE: "estudiocontable"
      DB_USERNAME: "root"
      DB_PASSWORD: "Casabene2025!"
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - backend

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: "Casabene2025!"
      MYSQL_DATABASE: "estudiocontable"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - backend

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    expose:
      - "80"
    environment:
      PMA_HOST: "db"
      PMA_USER: "root"
      PMA_PASSWORD: "Casabene2025!"
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  mysql_data:
